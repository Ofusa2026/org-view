  {label:'完了',color:'#16a34a',statuses:['完了','審査完了']}
];

function classify(c){return DONE_ST.indexOf(c.status)>=0?'done':'active';}
function groupCases(gid){
  var base=gid==='all'?allCases:allCases.filter(function(c){return classify(c)===gid;});
  if(searchQuery){
    var q=searchQuery.toLowerCase();
    base=base.filter(function(c){
      return (c.name||'').toLowerCase().includes(q)||(c.applicant||'').toLowerCase().includes(q)||
             (c.company||'').toLowerCase().includes(q)||(c.status||'').toLowerCase().includes(q)||
             (c.receiptNo||'').toLowerCase().includes(q)||(c.staff||'').toLowerCase().includes(q);
    });
  }
  if(filterStatus) base=base.filter(function(c){return c.status===filterStatus;});
  if(filterCompany) base=base.filter(function(c){return c.company===filterCompany;});
  // ソート
  base=base.slice().sort(function(a,b){
    var av=a[sortCol]||'',bv=b[sortCol]||'';
    if(!av&&!bv)return 0; if(!av)return 1; if(!bv)return -1;
    var r=av<bv?-1:av>bv?1:0;
    return sortDir==='asc'?r:-r;
  });
  return base;
}

function getUnconfirmedCaseIds(){
  var s={};
  notifications.forEach(function(n){ if(!n.confirmed_at) s[n.case_id]=true; });
  return s;
}

function renderMain(){
  // コメント入力中・IME変換中は再描画をスキップ（入力中の文字消失・フォーカス外れを防ぐ）
  if(_editingCommentId||_editingImeOn){
    _renderMainPending=true;
    return;
  }
  _renderMainPending=false;
  var cases=groupCases(currentGroup);
  renderFilterBar();
  var h='';
  if(!cases.length){h+='<div class="empty">該当する案件はありません</div>';}
  else if(currentView==='kanban'){h+=renderKanban(cases);}
  else{
    h+='<div class="tbl-wrap"><table><thead><tr>';
    COLS.forEach(function(c){h+=thHtml(c);});
    h+='</tr></thead><tbody>';
    cases.forEach(function(c){h+=buildRow(c);});
    h+='</tbody></table></div>';
  }
  document.getElementById('main').innerHTML=h;
}

// blur後に保留中のrenderMainを実行する

}

function renderKanban(cases){
  var allColStatuses=STATUS_COLS.reduce(function(a,col){return a.concat(col.statuses);},[]);
  var h='<div class="kanban-wrap">';
  STATUS_COLS.forEach(function(col){
    var colCases=cases.filter(function(c){return col.statuses.indexOf(c.status)>=0;});
    if(!colCases.length) return;
    h+=buildKanbanCol(col.label,col.color,colCases);
  });

  h+='</div>';
  return h;
}

// ========== 通知（お知らせ）機能 ==========
async function loadNotifications(){
  if(!orgName) return;
  try{
    // 最近60日以内の通知を取得
    var cutoff=new Date(); cutoff.setDate(cutoff.getDate()-60);
    var cutoffStr=cutoff.toISOString();
    var r=await sbFetch('share_notifications?org=eq.'+encodeURIComponent(orgName)+'&notified_at=gte.'+encodeURIComponent(cutoffStr)+'&select=id,case_id,status,receipt_no,notified_at,confirmed_at,confirmed_by&order=notified_at.desc&limit=200');
    if(!r.ok) return;
    var data=await r.json();
    if(!Array.isArray(data)) return;
    var prevUnconfirmed=notifications.filter(function(n){return !n.confirmed_at;}).length;
    notifications=data;
    updateNotifBadge();
    // 件数が変わったらリストも再描画（行ハイライト更新のため）
    var newUnconfirmed=notifications.filter(function(n){return !n.confirmed_at;}).length;
    if(newUnconfirmed!==prevUnconfirmed){
      if(currentGroup!=='receipts') renderMain();
    }
  }catch(e){ console.warn('loadNotifications error',e); }
}

function updateNotifBadge(){
  var btn=document.getElementById('notifBtn');
  var badge=document.getElementById('notifBadge');
  if(!btn||!badge) return;
  var unconfirmed=notifications.filter(function(n){return !n.confirmed_at;});
  btn.style.display='flex';
  if(unconfirmed.length>0){
    badge.style.display='flex';
    badge.textContent=unconfirmed.length>99?'99+':unconfirmed.length;
  } else {
    badge.style.display='none';
  }
}

function fmtTime(iso){
  if(!iso) return '';
  try{
    var d=new Date(iso); if(isNaN(d.getTime())) return '';
    var now=new Date(); var diff=now-d;
    if(diff<60000) return 'たった今';
    if(diff<3600000) return Math.floor(diff/60000)+'分前';
    if(diff<86400000) return Math.floor(diff/3600000)+'時間前';
    var m=d.getMonth()+1, day=d.getDate();
    var hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
    return m+'/'+day+' '+hh+':'+mm;
  }catch(e){ return ''; }
}

function renderNotifModal(){
  var body=document.getElementById('notifBody');
  if(!body) return;
  if(!notifications.length){
    body.innerHTML='<div class="notif-empty">お知らせはありません</div>';
    return;
  }
  // 未確認を上、確認済みを下（最近10件）
  var unconf=notifications.filter(function(n){return !n.confirmed_at;});
  var conf=notifications.filter(function(n){return n.confirmed_at;}).slice(0,10);
  var h='';
  if(unconf.length){
    h+='<div style="font-size:11px;font-weight:700;color:#b45309;margin:4px 6px 6px;">🔔 未確認（'+unconf.length+'）</div>';
    unconf.forEach(function(n){ h+=buildNotifItem(n,false); });
  } else {
    h+='<div style="padding:16px;text-align:center;color:#16a34a;font-size:12px;font-weight:700;">✅ 未確認のお知らせはありません</div>';
  }
  if(conf.length){
    h+='<div style="font-size:11px;font-weight:700;color:#94a3b8;margin:14px 6px 6px;">確認済み（最近 '+conf.length+'件）</div>';
    conf.forEach(function(n){ h+=buildNotifItem(n,true); });
  }
  body.innerHTML=h;
}

function buildNotifItem(n,isConfirmed){
  var c=allCases.find(function(x){return x.id===n.case_id;});
  var title=c?(c.name||c.applicant||'（案件）'):'（案件データなし）';
  var sub=c?[c.applicant,c.company].filter(Boolean).join(' / '):esc(n.case_id);
  var lbl=NOTIF_LABELS[n.status]||n.status;
  var cls=isConfirmed?'notif-item confirmed':'notif-item';
  var h='<div class="'+cls+'">';
  h+='<div class="notif-case-name">'+esc(title)+'</div>';
  h+='<div class="notif-meta">'+esc(sub)+(n.receipt_no?' ・ '+esc(n.receipt_no):'')+'</div>';
  h+='<div class="notif-status">'+esc(lbl)+'</div>';
  h+='<div class="notif-meta" style="margin-bottom:'+(isConfirmed?'0':'8px')+';">🕒 '+esc(fmtTime(n.notified_at));
  if(isConfirmed) h+=' / ✓ 確認済 '+esc(fmtTime(n.confirmed_at));
  h+='</div>';
  if(!isConfirmed){
    h+='<button class="notif-confirm-btn" onclick="confirmNotification(\''+esc(n.id)+'\')">✅ 確認済みにする</button>';
  }
  h+='</div>';
  return h;
}

function openNotifModal(){
  document.getElementById('notifModalBg').classList.add('open');
  renderNotifModal();
}
function closeNotifModal(){
  document.getElementById('notifModalBg').classList.remove('open');
}

async function confirmNotification(id){
  var n=notifications.find(function(x){return x.id===id;});
  if(!n||n.confirmed_at) return;
  try{
    var r=await sbFetch('share_notifications?id=eq.'+encodeURIComponent(id),{
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify({confirmed_at:new Date().toISOString(),confirmed_by:orgName||''})
    });
    if(!r.ok){ alert('確認済みへの更新に失敗しました'); return; }
    var updated=await r.json();
    if(Array.isArray(updated)&&updated.length){ Object.assign(n,updated[0]); }
    else { n.confirmed_at=new Date().toISOString(); }
    updateNotifBadge();
    renderNotifModal();
    if(currentGroup!=='receipts') renderMain();
  }catch(e){ alert('エラー: '+e.message); }
}

function startNotifPolling(){
  if(_notifTimer) clearInterval(_notifTimer);
  loadNotifications();
  _notifTimer=setInterval(loadNotifications, NOTIF_POLL_MS);
}
// ========== /通知機能 ==========

var _correctPass='';
function checkPass(){
  var input=document.getElementById('passInput').value.trim();
  if(input===_correctPass){
    document.getElementById('passScreen').style.display='none';
    loadData();
  }else{
    document.getElementById('passErr').textContent='パスワードが正しくありません';
    document.getElementById('passInput').value='';
    document.getElementById('passInput').focus();
  }
}

async function init(){
  var token=getParam('token');
  if(!token){document.getElementById('main').innerHTML='<div class="error-box">URLが正しくありません。</div>';return;}
  currentToken=token;
  try{
    var r=await sbFetch('settings?key=eq.'+encodeURIComponent('org_view_token_'+token)+'&select=value');
    var sd=await r.json();
    if(!sd||!sd.length){document.getElementById('main').innerHTML='<div class="error-box">このURLは無効です。担当者にお問い合わせください。</div>';return;}
    var orgId=sd[0].value;
    var r2=await sbFetch('support_orgs?id=eq.'+encodeURIComponent(orgId)+'&select=name');
    var od=await r2.json();
    orgName=(od&&od.length)?od[0].name:'';
    // パスワードチェック
    var rp=await sbFetch('settings?key=eq.'+encodeURIComponent('org_view_pass_'+token)+'&select=value');
    var pd=await rp.json();
    var pass=(pd&&pd.length)?pd[0].value:'';
    if(pass){
      _correctPass=pass;
      document.getElementById('passOrgName').textContent=orgName+' 様';
      document.getElementById('passScreen').style.display='flex';
      setTimeout(function(){document.getElementById('passInput').focus();},100);
      return;
    }
    // パスワードなしの場合はそのまま読込
    document.getElementById('headerOrg').textContent=orgName+' 様';
    document.title=orgName+' 様 | 案件進捗確認';
    await loadData();
  }catch(e){document.getElementById('main').innerHTML='<div class="error-box">読み込みエラー: '+e.message+'</div>';}
}

async function loadData(){
  try{
    // 案件取得（受付番号・帰国予定も含む）
    document.getElementById('headerOrg').textContent=orgName+' 様';
    document.title=orgName+' 様 | 案件進捗確認';
    var r4=await sbFetch('cases?org=eq.'+encodeURIComponent(orgName)+'&select=id,applicant,name,company,status,expire,tokurei_date,staff,team,app_type,receipt_no,temp_return&order=expire.asc.nullslast');
    var cases=await r4.json();
    allCases=(cases||[]).map(function(c){return{id:c.id,applicant:c.applicant||'',name:c.name||'',company:c.company||'',status:c.status||'',expire:c.expire||'',tokureiDate:c.tokurei_date||'',staff:c.staff||'',team:c.team||'',appType:c.app_type||'',receiptNo:c.receipt_no||'',tempReturn:c.temp_return||''};});
    // personsテーブルからtempReturn(一時帰国予定日)を取得して補完
    if(allCases.length){
      var pids=allCases.map(function(c){return c.id;});
      var PCHUNK=50;
      for(var pi=0;pi<pids.length;pi+=PCHUNK){
        var pchunk=pids.slice(pi,pi+PCHUNK);
        var rp=await sbFetch('persons?case_id=in.('+pchunk.map(function(id){return '"'+id+'"';}).join(',')+')'+'&select=case_id,temp_return');
        var persons=await rp.json();
        if(Array.isArray(persons)){
          persons.forEach(function(p){
            if(p.temp_return){
              var c=allCases.find(function(x){return x.id===p.case_id;});
              if(c&&!c.tempReturn) c.tempReturn=p.temp_return;
            }
          });
        }
      }
    }
    // 進捗コメント
    if(allCases.length){
      var ids=allCases.map(function(c){return c.id;});
      // 分割取得（URLが長くなりすぎないよう50件ずつ）
      var CHUNK=50;
      for(var ci=0;ci<ids.length;ci+=CHUNK){
        var chunk=ids.slice(ci,ci+CHUNK);
        var r5=await sbFetch('case_notes?case_id=in.('+chunk.map(function(id){return '"'+id+'"';}).join(',')+')'+'&select=case_id,note');
        var notes=await r5.json();
        (notes||[]).forEach(function(n){var note=n.note;if(typeof note==='string'){try{note=JSON.parse(note);}catch(e){note={progressMemo:note};}}caseNotes[n.case_id]=note||{};});
      }
      // 大房コメント取得（分割）
      var cmtKeys=ids.map(function(id){return 'org_comment_'+currentToken+'_'+id;});
      for(var ci2=0;ci2<cmtKeys.length;ci2+=CHUNK){
        var cmtChunk=cmtKeys.slice(ci2,ci2+CHUNK);
        var r6=await sbFetch('settings?key=in.('+cmtChunk.map(function(k){return '"'+k+'"';}).join(',')+')'+'&select=key,value');
        var cmts=await r6.json();
        if(Array.isArray(cmts)) (cmts||[]).forEach(function(row){var cid=row.key.replace('org_comment_'+currentToken+'_','');orgComments[cid]=row.value||'';});
      }
      // 登録支援機関様コメント取得（分割）
      var ownCmtKeys=ids.map(function(id){return 'org_own_comment_'+currentToken+'_'+id;});
      for(var ci3=0;ci3<ownCmtKeys.length;ci3+=CHUNK){
        var ownChunk=ownCmtKeys.slice(ci3,ci3+CHUNK);
        var r7=await sbFetch('settings?key=in.('+ownChunk.map(function(k){return '"'+k+'"';}).join(',')+')'+'&select=key,value');
        var ownCmts=await r7.json();
        if(Array.isArray(ownCmts)) (ownCmts||[]).forEach(function(row){var cid=row.key.replace('org_own_comment_'+currentToken+'_','');orgOwnComments[cid]=row.value||'';});
      }
    }
    // 申請記録取得（このorgに紐づく案件のcase_idで絞り込み）
    if(allCases.length){
      var caseIds=allCases.map(function(c){return c.id;});
      var RCHUNK=50;
      var _recTmp=[];
      for(var ri=0;ri<caseIds.length;ri+=RCHUNK){
        var rchunk=caseIds.slice(ri,ri+RCHUNK);
        var rr=await sbFetch('receipt_archive?case_id=in.('+rchunk.map(function(id){return '"'+id+'"';}).join(',')+')'+'&select=id,name,date,case_no,sub,case_id,application_date,reported&order=date.desc.nullslast');
        var recs=await rr.json();
        if(Array.isArray(recs)) _recTmp=_recTmp.concat(recs);
      }
      allReceipts=_recTmp.map(function(r){
        var lc=allCases.find(function(c){return c.id===r.case_id;})||null;
        return {id:r.id,name:r.name||'',date:r.date||'',caseNo:r.case_no||'',sub:r.sub||'',
          applicationDate:r.application_date||'',reported:r.reported||false,
          status:lc?(lc.status||''):''};
      });
    }
    renderSidebar();renderMain();
    // お知らせポーリング開始
    startNotifPolling();
  }catch(e){document.getElementById('main').innerHTML='<div class="error-box">読み込みエラー: '+e.message+'</div>';}
}
init();

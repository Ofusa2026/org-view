<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>案件進捗確認 | OFUSA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;font-size:12px;}
.header{background:#0f2040;color:white;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;}
.header-logo{font-size:10px;opacity:.5;letter-spacing:.5px;}
.header-title{font-size:15px;font-weight:800;}
.header-org{font-size:11px;opacity:.7;margin-left:auto;max-width:200px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.layout{display:flex;min-height:calc(100vh - 48px);}
.sidebar{width:160px;background:#1e293b;flex-shrink:0;padding:10px 0;position:sticky;top:48px;height:calc(100vh - 48px);overflow-y:auto;}
.sb-item{padding:10px 14px;cursor:pointer;font-size:11px;font-weight:600;color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:space-between;gap:6px;border-left:3px solid transparent;transition:.1s;}
.sb-item:hover{background:rgba(255,255,255,.07);color:white;}
.sb-item.active{background:rgba(99,102,241,.2);color:#a5b4fc;border-left-color:#6366f1;}
.sb-badge{background:rgba(255,255,255,.15);color:white;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700;}
.sb-item.active .sb-badge{background:#6366f1;}
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:6px 0;}
.main{flex:1;padding:12px;overflow:auto;min-width:0;}
/* 検索バー */
.search-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.search-bar input{flex:1;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;font-family:inherit;}
.search-bar input:focus{border-color:#6366f1;}
.search-count{font-size:11px;color:#94a3b8;white-space:nowrap;}
/* テーブル */
.tbl-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);background:white;}
table{border-collapse:collapse;width:100%;min-width:700px;}
thead tr{background:#0f2040;color:white;position:sticky;top:0;z-index:10;}
th{padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap;text-align:left;cursor:pointer;user-select:none;}
th:hover{background:#1e3a5f;}
th .sort-icon{margin-left:4px;opacity:.5;font-size:9px;}
th.sort-asc .sort-icon::after{content:'▲';}
th.sort-desc .sort-icon::after{content:'▼';}
th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:'⇅';}
td{padding:7px 10px;font-size:11px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#f8faff;}
.st-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px;border:1px solid;display:inline-block;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.type-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;display:inline-block;}
.type-nintei{background:#ede9fe;color:#7c3aed;}
.type-koshin{background:#eff6ff;color:#2563eb;}
.type-henkou{background:#fff7ed;color:#ea580c;}
.type-other{background:#f1f5f9;color:#64748b;}
.prog-memo{font-size:11px;color:#475569;background:#f8fafc;border-radius:6px;padding:6px 8px;border-left:3px solid #c7d2fe;line-height:1.5;white-space:pre-wrap;}
/* コメント欄 */
.org-comment-area{width:100%;min-width:160px;max-width:220px;border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 7px;font-size:11px;font-family:inherit;resize:vertical;min-height:52px;line-height:1.5;outline:none;color:#334155;}
.org-comment-area:focus{border-color:#6366f1;}
.save-btn{font-size:10px;padding:3px 10px;background:#6366f1;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:4px;font-weight:700;}
.save-btn:hover{background:#4f46e5;}
.save-btn.saved{background:#16a34a;}
.empty{text-align:center;padding:60px;color:#94a3b8;font-size:13px;}
.loading{text-align:center;padding:60px;color:#64748b;}
.error-box{background:#fee2e2;color:#dc2626;border-radius:8px;padding:16px;margin:16px;font-size:13px;}
/* パスワード認証 */
.pass-screen{position:fixed;inset:0;background:#0f2040;display:flex;align-items:center;justify-content:center;z-index:9999;}
.pass-box{background:white;border-radius:16px;padding:32px;width:100%;max-width:360px;margin:16px;text-align:center;}
.pass-logo{font-size:11px;color:#94a3b8;margin-bottom:8px;}
.pass-title{font-size:20px;font-weight:800;color:#0f2040;margin-bottom:4px;}
.pass-org{font-size:13px;color:#64748b;margin-bottom:24px;}
.pass-input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;outline:none;text-align:center;letter-spacing:2px;font-family:inherit;margin-bottom:12px;}
.pass-input:focus{border-color:#6366f1;}
.pass-btn{width:100%;padding:12px;background:#6366f1;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.pass-btn:hover{background:#4f46e5;}
.pass-err{color:#dc2626;font-size:12px;margin-top:8px;min-height:18px;}
@media(max-width:440px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;display:flex;overflow-x:auto;padding:0;}
  .sb-item{flex-direction:column;gap:2px;padding:8px 10px;font-size:10px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;}
  .sb-item.active{border-bottom-color:#6366f1;border-left:none;}
  .sb-divider{display:none;}
}
/* カンバン */
.view-toggle{display:flex;gap:6px;margin-bottom:10px;}
.view-btn{padding:5px 14px;font-size:11px;font-weight:700;border:1.5px solid #e2e8f0;border-radius:7px;cursor:pointer;background:white;color:#64748b;}
.view-btn.active{background:#2563eb;color:white;border-color:#2563eb;}
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:12px;}
.kanban-col{flex-shrink:0;width:220px;background:#f8fafc;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;}
.kanban-col-head{padding:8px 12px;font-size:11px;font-weight:800;color:white;display:flex;align-items:center;justify-content:space-between;}
.kanban-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px;}
.kanban-card{background:white;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.kanban-card-name{font-size:12px;font-weight:700;color:#0f2040;margin-bottom:3px;}
.kanban-card-sub{font-size:10px;color:#64748b;margin-bottom:5px;}
.kanban-card-meta{display:flex;flex-wrap:wrap;gap:4px;}
.kanban-badge{font-size:9px;padding:1px 6px;border-radius:99px;font-weight:700;}
</style>
</head>

</div>
<script>
var SUPABASE_URL='https://ehwlgbwpycglmopiqyty.supabase.co';
var SUPABASE_KEY='sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u';
function sbFetch(p,opts){return fetch(SUPABASE_URL+'/rest/v1/'+p,Object.assign({headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'}},opts||{}));}
function getParam(k){return new URLSearchParams(location.search).get(k);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var ST_BG={'未着手':'#f8fafc','★ヒアリングフォーム送付':'#ede9fe','ヒアリングフォーム回答待ち(送付済)':'#f8fafc','1-6作成':'#eff6ff','★1-6企業送付':'#ede9fe','1-6企業確認待ち(送付済)':'#f8fafc','1-6修正':'#fff7ed','★1-6修正送付':'#ede9fe','サイン書類作成':'#eff6ff','★サイン書類送付':'#ede9fe','サイン書類返送待ち(送付済)':'#f8fafc','★企業押印送付':'#ede9fe','企業押印返送待ち(送付済)':'#f8fafc','スキャン書類作成':'#eff6ff','★申請':'#f0fdf4','申請済(番号待)':'#f0fdf4','審査中':'#fef3c7','特活審査中':'#fef3c7','許可済 受取方法調整中':'#f0f9ff','★要追完':'#fff7ed','要追完 企業不足書類待ち':'#fff7ed','要追完 人材不足書類待ち':'#fff7ed','郵送交付':'#f0f9ff','★郵送交付':'#f0f9ff','窓口受取':'#f0f9ff','★窓口受取':'#f0f9ff','入管受取ステータス変更中':'#e0f2fe'};
var ST_COL={'未着手':'#64748b','★ヒアリングフォーム送付':'#7c3aed','ヒアリングフォーム回答待ち(送付済)':'#94a3b8','1-6作成':'#2563eb','★1-6企業送付':'#7c3aed','1-6企業確認待ち(送付済)':'#94a3b8','1-6修正':'#ea580c','★1-6修正送付':'#7c3aed','サイン書類作成':'#2563eb','★サイン書類送付':'#7c3aed','サイン書類返送待ち(送付済)':'#94a3b8','★企業押印送付':'#7c3aed','企業押印返送待ち(送付済)':'#94a3b8','スキャン書類作成':'#2563eb','★申請':'#16a34a','申請済(番号待)':'#059669','審査中':'#d97706','特活審査中':'#d97706','許可済 受取方法調整中':'#0369a1','★要追完':'#ea580c','要追完 企業不足書類待ち':'#ea580c','要追完 人材不足書類待ち':'#ea580c','郵送交付':'#0369a1','★郵送交付':'#0369a1','窓口受取':'#0369a1','★窓口受取':'#0369a1','入管受取ステータス変更中':'#0284c7'};
var ST_BOR={'未着手':'#e2e8f0','★ヒアリングフォーム送付':'#c4b5fd','ヒアリングフォーム回答待ち(送付済)':'#e2e8f0','1-6作成':'#93c5fd','★1-6企業送付':'#c4b5fd','1-6企業確認待ち(送付済)':'#e2e8f0','1-6修正':'#fdba74','★1-6修正送付':'#c4b5fd','サイン書類作成':'#93c5fd','★サイン書類送付':'#c4b5fd','サイン書類返送待ち(送付済)':'#e2e8f0','★企業押印送付':'#c4b5fd','企業押印返送待ち(送付済)':'#e2e8f0','スキャン書類作成':'#93c5fd','★申請':'#86efac','申請済(番号待)':'#6ee7b7','審査中':'#fcd34d','特活審査中':'#fcd34d','許可済 受取方法調整中':'#7dd3fc','★要追完':'#fdba74','要追完 企業不足書類待ち':'#fdba74','要追完 人材不足書類待ち':'#fdba74','郵送交付':'#7dd3fc','★郵送交付':'#7dd3fc','窓口受取':'#7dd3fc','★窓口受取':'#7dd3fc','入管受取ステータス変更中':'#38bdf8'};

var DONE_ST=['完了','審査完了','★郵送交付','★窓口受取','窓口受取（本人）','許可済 受取方法調整中'];
var GROUPS=[{id:'active',label:'進行中'},{id:'done',label:'完了・許可済'},{id:'all',label:'すべて'}];
var allCases=[],caseNotes={},orgComments={},currentGroup='active',currentView='list',searchQuery='',filterStatus='',filterCompany='',sortCol='expire',sortDir='asc',currentToken='',orgName='';
var STATUS_COLS=[
  {label:'書類準備中',color:'#7c3aed',statuses:['未着手','★ヒアリングフォーム送付','ヒアリングフォーム回答待ち(送付済)','雇用条件待ち','1-6作成','★1-6企業送付','1-6企業確認待ち(送付済)','1-6修正','★1-6修正送付']},
  {label:'署名・押印',color:'#2563eb',statuses:['サイン書類作成','★サイン書類送付','サイン書類返送待ち(送付済)','企業書類作成','★企業押印送付','企業押印返送待ち(送付済)','人材書類待ち','企業書類待ち','スキャン書類作成']},
  {label:'申請・審査中',color:'#0891b2',statuses:['★申請','申請済(番号待)','審査中','特活審査中']},
  {label:'要追完',color:'#d97706',statuses:['★要追完','要追完 企業不足書類待ち','要追完 人材不足書類待ち']},
  {label:'受取調整中',color:'#059669',statuses:['許可済 受取方法調整中','入管受取ステータス変更中','★郵送交付','郵送交付中','★窓口受取','窓口受取（本人）']},
  {label:'完了',color:'#475569',statuses:['完了','審査完了']}
];

function classify(c){return DONE_ST.indexOf(c.status)>=0?'done':'active';}
function groupCases(gid){
  var base=gid==='all'?allCases:allCases.filter(function(c){return classify(c)===gid;});
  if(searchQuery){
    var q=searchQuery.toLowerCase();
    base=base.filter(function(c){
      return (c.name||'').toLowerCase().includes(q)||(c.applicant||'').toLowerCase().includes(q)||
             (c.company||'').toLowerCase().includes(q)||(c.status||'').toLowerCase().includes(q)||
             (c.receiptNo||'').toLowerCase().includes(q)||(c.staff||'').toLowerCase().includes(q);
    });
  }
  if(filterStatus) base=base.filter(function(c){return c.status===filterStatus;});
  if(filterCompany) base=base.filter(function(c){return c.company===filterCompany;});
  // ソート
  base=base.slice().sort(function(a,b){
    var av=a[sortCol]||'',bv=b[sortCol]||'';
    if(!av&&!bv)return 0; if(!av)return 1; if(!bv)return -1;
    var r=av<bv?-1:av>bv?1:0;
    return sortDir==='asc'?r:-r;
  });
  return base;
}

function buildRow(c){
  var note=caseNotes[c.id]||{};
  var memo=note.progressMemo||'';
  var comment=orgComments[c.id]||'';
  var today=new Date();today.setHours(0,0,0,0);
  var exp=new Date(c.expire);exp.setHours(0,0,0,0);
  var days=c.expire?Math.ceil((exp-today)/86400000):null;
  var isShinsa=(c.status==='審査中'||c.status==='特活審査中');
  var tokStr='—';
  if(c.tokureiDate){tokStr=c.tokureiDate;}
  else if(c.expire&&!isNaN(exp.getTime())){var t2=new Date(exp);t2.setMonth(t2.getMonth()+2);tokStr=t2.toISOString().split('T')[0];}
  var expStyle='';
  if(c.expire&&!isShinsa){
    if(days<=0)expStyle='background:#fee2e2;color:#dc2626;font-weight:800;';
    else if(days<=14)expStyle='background:#fff7ed;color:#ea580c;font-weight:700;';
    else if(days<=30)expStyle='color:#d97706;font-weight:700;';
  }
  var stHtml;
  if(c.status==='審査完了'||c.status==='完了'){
    stHtml='<span class="st-badge" style="background:#f0fdf4;color:#16a34a;border-color:#86efac;">✓完了</span>';
  }else{
    var bg=ST_BG[c.status]||'#f8fafc',col=ST_COL[c.status]||'#64748b',bor=ST_BOR[c.status]||'#e2e8f0';
    stHtml='<span class="st-badge" style="background:'+bg+';color:'+col+';border-color:'+bor+';">'+esc(c.status||'未着手')+'</span>';
  }
  var tCls=c.appType==='認定'?'type-nintei':c.appType==='更新'?'type-koshin':c.appType==='変更'?'type-henkou':'type-other';
  var typeHtml=c.appType?'<span class="type-badge '+tCls+'">'+esc(c.appType)+'</span>':'—';
  var teamShort=(c.team||'').replace(/チーム$/,'').replace(/\s*チーム/,'');
  var staffShort=(c.staff||'').split(/[\s\u3000]/)[0];
  var displayName=c.name||c.applicant||'（未設定）';
  // 帰国予定色
  var retStyle='';
  if(c.tempReturn){var rd=new Date(c.tempReturn);rd.setHours(0,0,0,0);var rdays=Math.ceil((rd-today)/86400000);if(rdays<=0)retStyle='color:#16a34a;font-weight:700;';else if(rdays<=10)retStyle='color:#ea580c;font-weight:700;';}

  var cid=esc(c.id);
  var h='<tr>';
  h+='<td style="min-width:150px;max-width:190px;"><div style="font-size:11px;font-weight:700;color:#0f2040;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;" title="'+esc(displayName)+'">'+esc(displayName)+'</div><div style="font-size:10px;color:#6b7280;">'+esc(c.applicant||'')+'</div></td>';
  h+='<td style="min-width:90px;max-width:120px;"><div style="font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px;">'+esc(c.company||'—')+'</div></td>';
  h+='<td style="width:48px;">'+typeHtml+'</td>';
  h+='<td style="width:65px;">'+(teamShort?'<div style="font-size:10px;font-weight:600;">'+esc(teamShort)+'</div>':'')+(staffShort?'<div style="font-size:10px;color:#6b7280;">'+esc(staffShort)+'</div>':'')+'</td>';
  h+='<td style="white-space:nowrap;">'+stHtml+'</td>';
  h+='<td style="'+expStyle+'font-size:10px;white-space:nowrap;min-width:88px;">';
  if(isShinsa){h+='<div style="font-size:9px;color:#9ca3af;">'+(c.expire||'—')+'</div><div style="font-size:10px;font-weight:700;">特例 '+tokStr+'</div>';}
  else{h+='<div>'+(c.expire||'—')+'</div><div style="color:#9ca3af;font-size:9px;">特例 '+tokStr+'</div>';if(days!==null&&days<=14&&days>0)h+='<div style="color:#ea580c;font-size:9px;">あと'+days+'日</div>';else if(days!==null&&days<=0&&c.expire)h+='<div style="color:#dc2626;font-size:9px;">期限切れ</div>';}
  h+='</td>';
  // 受付番号
  h+='<td style="font-size:10px;white-space:nowrap;">'+(c.receiptNo?'<span style="color:#2563eb;font-weight:700;">'+esc(c.receiptNo)+'</span>':'<span style="color:#d1d5db;">—</span>')+'</td>';
  // 帰国予定
  h+='<td style="font-size:10px;white-space:nowrap;'+retStyle+'">'+(c.tempReturn||'<span style="color:#d1d5db;">—</span>')+'</td>';
  // 進捗コメント
  h+='<td style="max-width:240px;">'+(memo?'<div class="prog-memo">'+esc(memo)+'</div>':'<span style="color:#d1d5db;">—</span>')+'</td>';
  // 登録支援機関コメント
  h+='<td style="min-width:180px;">';
  h+='<textarea class="org-comment-area" id="cmt_'+cid+'" placeholder="コメントを入力...">'+esc(comment)+'</textarea>';
  h+='<div><button class="save-btn" id="savebtn_'+cid+'" onclick="saveComment(\''+cid+'\')">保存</button></div>';
  h+='</td>';
  h+='</tr>';
  return h;
}

function renderSidebar(){
  var h='';
  GROUPS.forEach(function(g,i){
    var count=groupCases(g.id).length;
    h+='<div class="sb-item'+(currentGroup===g.id?' active':'')+'" onclick="switchGroup(\''+g.id+'\')">';
    h+='<span>'+g.label+'</span><span class="sb-badge">'+count+'</span></div>';
    if(i===0)h+='<div class="sb-divider"></div>';
  });
  document.getElementById('sidebar').innerHTML=h;
}

var COLS=[
  {key:'name',label:'案件名 / 申請者'},
  {key:'company',label:'所属機関'},
  {key:'appType',label:'種別'},
  {key:'staff',label:'担当'},
  {key:'status',label:'ステータス'},
  {key:'expire',label:'在留期限 / 特例'},
  {key:'receiptNo',label:'受付番号'},
  {key:'tempReturn',label:'帰国予定'},
  {key:'progressMemo',label:'進捗コメント'},
  {key:'_comment',label:'支援機関コメント',noSort:true}
];

function thHtml(col){
  if(col.noSort)return '<th>'+col.label+'</th>';
  var cls=sortCol===col.key?(sortDir==='asc'?'sort-asc':'sort-desc'):'';
  return '<th class="'+cls+'" onclick="toggleSort(\''+col.key+'\')">'+col.label+' <span class="sort-icon"></span></th>';
}

function toggleSort(key){
  if(sortCol===key){sortDir=sortDir==='asc'?'desc':'asc';}else{sortCol=key;sortDir='asc';}
  renderMain();
}

function setView(v){currentView=v;renderMain();}

function renderMain(){
  var cases=groupCases(currentGroup);
  // フィルター用ユニーク値
  var baseAll=currentGroup==='all'?allCases:allCases.filter(function(c){return classify(c)===currentGroup;});
  var statuses=[...new Set(baseAll.map(function(c){return c.status||'';}).filter(Boolean))].sort();
  var companies=[...new Set(baseAll.map(function(c){return c.company||'';}).filter(Boolean))].sort();

  var h='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center;">';
  // テキスト検索
  h+='<input type="text" placeholder="🔍 フリーワード検索..." value="'+esc(searchQuery)+'" oninput="searchQuery=this.value;renderSidebar();renderMain()" style="padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;font-family:inherit;min-width:200px;flex:1;">';
  // ステータスフィルター
  h+='<select onchange="filterStatus=this.value;renderSidebar();renderMain()" style="padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;background:white;cursor:pointer;">';
  h+='<option value="">ステータス（全て）</option>';
  statuses.forEach(function(s){h+='<option value="'+esc(s)+'"'+(filterStatus===s?' selected':'')+'>'+esc(s)+'</option>';});
  h+='</select>';
  // 企業フィルター
  h+='<select onchange="filterCompany=this.value;renderSidebar();renderMain()" style="padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;background:white;cursor:pointer;">';
  h+='<option value="">所属機関（全て）</option>';
  companies.forEach(function(c){h+='<option value="'+esc(c)+'"'+(filterCompany===c?' selected':'')+'>'+esc(c)+'</option>';});
  h+='</select>';
  // クリアボタン
  if(searchQuery||filterStatus||filterCompany) h+='<button onclick="searchQuery=\'\';filterStatus=\'\';filterCompany=\'\';renderSidebar();renderMain()" style="padding:7px 12px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;">✕ クリア</button>';
  h+='<span style="font-size:11px;color:#94a3b8;white-space:nowrap;">'+cases.length+'件</span>';
  // ビュー切り替えボタン
  h+='<div style="display:flex;gap:3px;background:#f1f5f9;border-radius:8px;padding:3px;margin-left:auto;">';
  h+='<button onclick="setView(\'list\')" style="padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;'+(currentView==='list'?'background:white;color:#0f2040;box-shadow:0 1px 3px rgba(0,0,0,.1);':'background:none;color:#94a3b8;')+'"">☰ リスト</button>';
  h+='<button onclick="setView(\'kanban\')" style="padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;'+(currentView==='kanban'?'background:white;color:#0f2040;box-shadow:0 1px 3px rgba(0,0,0,.1);':'background:none;color:#94a3b8;')+'"">▦ カンバン</button>';
  h+='</div>';
  h+='</div>';
  if(!cases.length){h+='<div class="empty">該当する案件はありません</div>';}
  else if(currentView==='kanban'){h+=renderKanban(cases);}
  else{
    h+='<div class="tbl-wrap"><table><thead><tr>';
    COLS.forEach(function(c){h+=thHtml(c);});
    h+='</tr></thead><tbody>';
    cases.forEach(function(c){h+=buildRow(c);});
    h+='</tbody></table></div>';
  }
  document.getElementById('main').innerHTML=h;
}

function renderKanban(cases){
  var h='<div class="search-bar">';
  h+='<input type="text" placeholder="🔍 検索..." value="'+esc(searchQuery)+'" oninput="searchQuery=this.value;renderSidebar();renderMain()" style="max-width:300px;">';
  h+='<span class="search-count">'+cases.length+'件</span>';
  h+='</div>';
  h+='<div class="kanban-wrap">';
  STATUS_COLS.forEach(function(col){
    var colCases=cases.filter(function(c){return col.statuses.indexOf(c.status)>=0;});
    h+='<div class="kanban-col">';
    h+='<div class="kanban-col-head" style="background:'+col.color+';">';
    h+=esc(col.label);
    h+='<span style="background:rgba(255,255,255,.25);padding:1px 8px;border-radius:99px;font-size:10px;">'+colCases.length+'</span>';
    h+='</div>';
    h+='<div class="kanban-col-body">';
    if(!colCases.length){h+='<div style="font-size:11px;color:#cbd5e1;text-align:center;padding:12px 0;">—</div>';}
    colCases.forEach(function(c){
      var note=caseNotes[c.id]||{};
      var today=new Date();today.setHours(0,0,0,0);
      var days=c.expire?Math.ceil((new Date(c.expire)-today)/86400000):null;
      var expColor=days===null?'#94a3b8':days<=0?'#dc2626':days<=14?'#ea580c':days<=30?'#d97706':'#64748b';
      var stBg=ST_BG[c.status]||'#f8fafc',stCol=ST_COL[c.status]||'#64748b';
      h+='<div class="kanban-card" style="border-left:3px solid '+col.color+';">';
      h+='<div class="kanban-card-name">'+esc(c.name||c.applicant||'（未設定）')+'</div>';
      if(c.applicant&&c.name)h+='<div class="kanban-card-sub">'+esc(c.applicant)+'</div>';
      h+='<div class="kanban-card-sub">'+esc(c.company||'')+'</div>';
      h+='<div class="kanban-card-meta">';
      if(c.status)h+='<span class="kanban-badge" style="background:'+stBg+';color:'+stCol+';">'+esc(c.status)+'</span>';
      if(c.expire)h+='<span class="kanban-badge" style="background:#f8fafc;color:'+expColor+';">📅'+c.expire+(days!==null&&days<=30?' (あと'+days+'日)':'')+'</span>';
      if(c.staff)h+='<span class="kanban-badge" style="background:#f0fdf4;color:#16a34a;">'+esc((c.staff||'').split(/[\s　]/)[0])+'</span>';
      if(note.progressMemo)h+='<div style="font-size:10px;color:#64748b;margin-top:4px;padding-top:4px;border-top:1px solid #f1f5f9;line-height:1.4;white-space:pre-wrap;max-height:60px;overflow:hidden;">'+esc(note.progressMemo)+'</div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

function switchGroup(gid){currentGroup=gid;renderSidebar();renderMain();}

async function saveComment(caseId){
  var ta=document.getElementById('cmt_'+caseId);
  var btn=document.getElementById('savebtn_'+caseId);
  if(!ta||!btn)return;
  var val=ta.value.trim();
  orgComments[caseId]=val;
  var key='org_comment_'+currentToken+'_'+caseId;
  btn.textContent='保存中...';btn.disabled=true;
  try{
    await sbFetch('settings',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key:key,value:val})});
    btn.textContent='✓保存済';btn.className='save-btn saved';
    setTimeout(function(){btn.textContent='保存';btn.className='save-btn';btn.disabled=false;},2000);
  }catch(e){btn.textContent='保存';btn.disabled=false;alert('保存失敗: '+e.message);}
}

var _correctPass='';
function checkPass(){
  var input=document.getElementById('passInput').value.trim();
  if(input===_correctPass){
    document.getElementById('passScreen').style.display='none';
    loadData();
  }else{
    document.getElementById('passErr').textContent='パスワードが正しくありません';
    document.getElementById('passInput').value='';
    document.getElementById('passInput').focus();
  }
}

async function init(){
  var token=getParam('token');
  if(!token){document.getElementById('main').innerHTML='<div class="error-box">URLが正しくありません。</div>';return;}
  currentToken=token;
  try{
    var r=await sbFetch('settings?key=eq.'+encodeURIComponent('org_view_token_'+token)+'&select=value');
    var sd=await r.json();
    if(!sd||!sd.length){document.getElementById('main').innerHTML='<div class="error-box">このURLは無効です。担当者にお問い合わせください。</div>';return;}
    var orgId=sd[0].value;
    var r2=await sbFetch('support_orgs?id=eq.'+encodeURIComponent(orgId)+'&select=name');
    var od=await r2.json();
    orgName=(od&&od.length)?od[0].name:'';
    // パスワードチェック
    var rp=await sbFetch('settings?key=eq.'+encodeURIComponent('org_view_pass_'+token)+'&select=value');
    var pd=await rp.json();
    var pass=(pd&&pd.length)?pd[0].value:'';
    if(pass){
      _correctPass=pass;
      document.getElementById('passOrgName').textContent=orgName+' 様';
      document.getElementById('passScreen').style.display='flex';
      setTimeout(function(){document.getElementById('passInput').focus();},100);
      return;
    }
    // パスワードなしの場合はそのまま読込
    document.getElementById('headerOrg').textContent=orgName+' 様';
    document.title=orgName+' 様 | 案件進捗確認';
    await loadData();
  }catch(e){document.getElementById('main').innerHTML='<div class="error-box">読み込みエラー: '+e.message+'</div>';}
}

async function loadData(){
  try{
    // 案件取得（受付番号・帰国予定も含む）
    document.getElementById('headerOrg').textContent=orgName+' 様';
    document.title=orgName+' 様 | 案件進捗確認';
    var r4=await sbFetch('cases?org=eq.'+encodeURIComponent(orgName)+'&select=id,applicant,name,company,status,expire,tokurei_date,staff,team,app_type,receipt_no,temp_return&order=expire.asc.nullslast');
    var cases=await r4.json();
    allCases=(cases||[]).map(function(c){return{id:c.id,applicant:c.applicant||'',name:c.name||'',company:c.company||'',status:c.status||'',expire:c.expire||'',tokureiDate:c.tokurei_date||'',staff:c.staff||'',team:c.team||'',appType:c.app_type||'',receiptNo:c.receipt_no||'',tempReturn:c.temp_return||''};});
    // 進捗コメント
    if(allCases.length){
      var ids=allCases.map(function(c){return c.id;});
      var r5=await sbFetch('case_notes?case_id=in.('+ids.map(function(id){return '"'+id+'"';}).join(',')+')'+'&select=case_id,note');
      var notes=await r5.json();
      (notes||[]).forEach(function(n){var note=n.note;if(typeof note==='string'){try{note=JSON.parse(note);}catch(e){note={progressMemo:note};}}caseNotes[n.case_id]=note||{};});
      // 支援機関コメント取得
      var cmtKeys=ids.map(function(id){return 'org_comment_'+currentToken+'_'+id;});
      var r6=await sbFetch('settings?key=in.('+cmtKeys.map(function(k){return '"'+k+'"';}).join(',')+')'+'&select=key,value');
      var cmts=await r6.json();
      (cmts||[]).forEach(function(row){var cid=row.key.replace('org_comment_'+currentToken+'_','');orgComments[cid]=row.value||'';});
    }
    renderSidebar();renderMain();
  }catch(e){document.getElementById('main').innerHTML='<div class="error-box">読み込みエラー: '+e.message+'</div>';}
}
init();
</script>
